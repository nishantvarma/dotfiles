set -g base-index 1
set -g default-terminal "tmux-256color"
set -g escape-time 1
set -g history-limit 1024
set -g mode-style bg=colour4,fg=colour0
set -g mouse on
set -g pane-active-border-style fg=colour4
set -g pane-border-lines single
set -g pane-border-style fg=colour8
set -g prefix `
set -g status on
set -g status-bg colour0
set -g status-fg colour7
set -g status-left "#[fg=colour4]⠿ "
set -g status-right "#[fg=colour1](#S)"
set -g window-status-current-format "#[bg=colour8,fg=colour7]#W"
set -g window-status-format "#[fg=colour7]#W"
set -g window-status-separator "   "

bind-key b set -g status
bind-key k clear-history
bind-key m set -g mouse
bind-key r source-file ~/.tmux.conf
bind-key ` send-key `
bind-key Tab last-window
